services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: neuralscope-postgres
    environment:
      POSTGRES_USER: neuralscope
      POSTGRES_PASSWORD: neuralscope
      POSTGRES_DB: neuralscope
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neuralscope"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: neuralscope-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: neuralscope-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  server:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.server
    container_name: neuralscope-server
    ports:
      - "${SERVER_HOST_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://neuralscope:neuralscope@postgres:5432/neuralscope
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
      APP_ENV: ${APP_ENV:-development}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: "8080"
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: http://localhost:${SERVER_HOST_PORT:-8080}
        NEXT_PUBLIC_WS_URL: ws://localhost:${SERVER_HOST_PORT:-8080}/ws
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    container_name: neuralscope-web
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://neuralscope:neuralscope@postgres:5432/neuralscope
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-dev-secret-change-in-production}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      APP_ENV: ${APP_ENV:-development}
    depends_on:
      server:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
