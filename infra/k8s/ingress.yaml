apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: neuralscope-ingress
  namespace: neuralscope
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - app.example.com
      secretName: neuralscope-tls
  rules:
    - host: app.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: neuralscope-server
                port:
                  number: 8080
          - path: /health
            pathType: Exact
            backend:
              service:
                name: neuralscope-server
                port:
                  number: 8080
          - path: /ready
            pathType: Exact
            backend:
              service:
                name: neuralscope-server
                port:
                  number: 8080
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: neuralscope-server
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: neuralscope-web
                port:
                  number: 3000
