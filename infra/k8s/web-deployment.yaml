apiVersion: apps/v1
kind: Deployment
metadata:
  name: neuralscope-web
  namespace: neuralscope
  labels:
    app: neuralscope-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: neuralscope-web
  template:
    metadata:
      labels:
        app: neuralscope-web
    spec:
      containers:
        - name: web
          image: neuralscope/web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: neuralscope-config
            - secretRef:
                name: neuralscope-secrets
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
